name: Publish app to GitHub Pages

# The site serves from the gh-pages branch:
# https://hardie29-byte.github.io/Saga-goaltending-/
# This workflow mirrors the app/ folder to that branch.

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to publish the app/ folder from"
        required: false
        default: "main"

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
      - name: Push app/ to gh-pages
        run: |
          cd app
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish app to GitHub Pages"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
